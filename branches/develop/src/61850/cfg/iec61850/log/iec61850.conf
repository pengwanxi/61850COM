[global]
strict init = true
buffer min = 1024
buffer max = 2MB
# rotate lock file = ~/tmp/zlog.lock
default format = "%d.%us %-6V (%c:%F:%L) - %m%n"
file perms = 644

[levels]
TRACE = 10
CRIT = 130, LOG_CRIT

[formats]
simple = "%d %m%n"
normal = "%d %V (%c:%f:%L:%U) - %m%n"
msnormal = "%d.%ms %V (%c:%f:%L:%U) - %m%n"

rnormal = "%d %V - %m%n"
rmsnormal = "%d.%ms %V - %m%n"

[rules]
# *.*               >stdout; rnormal
# dev_sys.*               >stdout; normal
# module.*               >stdout; normal
glog.*            "/mynand/log/glog.log",3MB*1; normal
startup.*            "/mynand/log/startup.log",1MB*1; normal
cfg.*            "/mynand/log/cfg.log",2MB*2; msnormal
out.*            "/mynand/log/out.log",2MB*2; msnormal
comm.*            "/mynand/log/comm.log",2MB*2; msnormal
protocol.*        "/mynand/log/protocol.log",1M*2; normal
dev.*            "/mynand/log/dev.log",1MB*2; normal
deval.*            "/mynand/log/deval.log",1MB*2; normal
msg.*            "/mynand/log/msg.log",1MB*1; normal
svc.*            "/mynand/log/svc.log",1MB*1; normal
